version: '3.8'

services:

  db:
    image: postgis/postgis
    container_name: webgis-db
    restart: always

    environment:
      POSTGRES_USER: gis
      POSTGRES_PASSWORD: gis
      POSTGRES_DB: gisdb

    ports:
      - "5432:5432"

    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: