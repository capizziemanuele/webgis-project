version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: webgis_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-webgis}
      POSTGRES_USER: ${POSTGRES_USER:-webgis_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-webgis_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-webgis_user} -d ${POSTGRES_DB:-webgis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: webgis_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-webgis_user}:${POSTGRES_PASSWORD:-webgis_password}@db:5432/${POSTGRES_DB:-webgis}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      FIRST_ADMIN_USERNAME: ${FIRST_ADMIN_USERNAME:-admin}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-admin@webgis.local}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-admin123}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: webgis_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/uploads:ro
    depends_on:
      - backend

volumes:
  postgres_data:
